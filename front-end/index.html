<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Cadastrar Novo Lead</h2>
        
        <form id="formLead" class="space-y-4">
            <div>
                <label class="block text-gray-600 text-sm font-medium mb-1">Nome Completo</label>
                <input type="text" id="nome" required class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-600 text-sm font-medium mb-1">WhatsApp</label>
                <input type="text" id="telefone" required class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">
                Salvar Lead
            </button>
        </form>
    </div>

    <script>
        // Esse é o JavaScript que pega os dados e envia para o Python
        document.getElementById('formLead').addEventListener('submit', async function(e) {
            e.preventDefault(); // Impede a página de recarregar
            
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;

            // Envia para a Rota 2 do nosso main.py
            const resposta = await fetch('/api/leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome: nome, telefone: telefone })
            });

            if(resposta.ok) {
                alert('Lead salvo com sucesso no motor Python!');
                document.getElementById('formLead').reset(); // Limpa o formulário
            }
        });
    </script>
</body>
</html>
